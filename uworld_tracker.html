// ── Persistence & Migration ───────────────────────────
function saveLocal() {
  localStorage.setItem('uw-settings', JSON.stringify(settings));
  localStorage.setItem('uw-entries',  JSON.stringify(entries));
  localStorage.setItem('uw-exams',    JSON.stringify(exams));
}

function runMigration() {
  let needsSave = false;
  // Convert old manual unique overrides into the new offset system
  if (settings.currentUnique !== undefined) {
    settings.uniqueOffset = settings.currentUnique - getRawVolume();
    delete settings.currentUnique;
    needsSave = true;
  }
  if (settings.done !== undefined) {
    delete settings.done;
    needsSave = true;
  }
  if (needsSave) saveLocal();
}

function loadLocal() {
  try {
    const e = localStorage.getItem('uw-entries');  if (e) entries  = JSON.parse(e);
    const x = localStorage.getItem('uw-exams');    if (x) exams    = JSON.parse(x);
    const s = localStorage.getItem('uw-settings'); if (s) settings = {...settings, ...JSON.parse(s)};
  } catch(e) {}
}

async function syncToFirebase() {
  if (!currentUser || !db) return;
  try { await db.collection('users').doc(currentUser.uid).set(
    { uwSettings:settings, uwEntries:entries, uwExams:exams }, { merge:true }); }
  catch(e) { console.error(e); }
}

async function loadFromFirebase() {
  if (!currentUser || !db) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const d = doc.data();
      if (d.uwEntries)  entries  = d.uwEntries;
      if (d.uwExams)    exams    = d.uwExams;
      if (d.uwSettings) settings = {...settings, ...d.uwSettings};
      saveLocal();
    }
  } catch(e) { console.error(e); }
}

if (auth) {
  auth.onAuthStateChanged(async (user) => {
    currentUser = user;
    document.getElementById('auth-banner').classList.toggle('hidden', !!user);
    if (user) { await loadFromFirebase(); }
    runMigration();
    renderAll();
  });
} else {
  document.getElementById('auth-banner').classList.remove('hidden');
}

  const panel = document.getElementById('setup-panel');

  btn.classList.toggle('open');

function initSetupUI() {

function saveSetup() {

// ── Auto vs Manual Unique Progress ────────────────────
function getRawVolume() {
  return entries.reduce((sum, e) => sum + (e.qs || 0), 0);
}

function getCurrentUnique() {
  // Defaults to sum of all logged questions. Edited offset handles incorrects.
  return Math.max(0, getRawVolume() + (settings.uniqueOffset || 0));
}

function promptUpdateUnique() {
  const current = getCurrentUnique();
  const input = prompt("Enter your actual Unique Questions Completed count:", current);
  if (input !== null) {
    const num = parseInt(input);
    if (!isNaN(num) && num >= 0) {
      settings.uniqueOffset = num - getRawVolume();
      saveLocal(); syncToFirebase(); renderStats();
      showToast(`Progress calibrated to ${num} ✦`);
    } else {
      showToast('Please enter a valid number.');
    }
  }
}

// ── Stats Calculation ─────────────────────────────────
function calcNeededMath() {
  if (!settings.finishBy) return null;
  const done = getCurrentUnique();
  const remaining = Math.max(0, settings.total - done);
  if (remaining <= 0) return { remaining, daysLeft: 0, needed: 0 };
  
  const now = new Date(); now.setHours(0,0,0,0);
  const finish = new Date(settings.finishBy + 'T12:00:00');
  finish.setHours(0,0,0,0);
  
  let daysLeft = 0;
  let cur = new Date(now);
  while (cur <= finish) {
    if ((settings.studyDays || []).includes(cur.getDay())) daysLeft++;
    cur.setDate(cur.getDate() + 1);
  }
  
  return { 
    remaining, 
    daysLeft, 
    needed: daysLeft > 0 ? Math.ceil(remaining / daysLeft) : remaining 
  };
}

function showPaceMath() {
  const math = calcNeededMath();
  if (!math) return showToast("Set a 'Finish QBank By' date in settings first.");
  if (math.remaining <= 0) return showToast("QBank complete. No questions needed per day.");
  alert(`Pace Calculation:\n\n${math.remaining.toLocaleString()} remaining questions\n÷ ${math.daysLeft} study days left\n= ${math.needed} questions/day`);
}

function renderStats() {
  const done = getCurrentUnique();
  const remaining = Math.max(0, settings.total - done);
  const pct  = settings.total > 0 ? Math.round((done/settings.total)*100) : 0;
  
  const math = calcNeededMath();
  const needed = math ? math.needed : '—';

  document.getElementById('stat-done').textContent    = done.toLocaleString();
  document.getElementById('stat-remain').textContent  = remaining.toLocaleString();
  document.getElementById('stat-pct').textContent     = pct+'%';
  
  const nel = document.getElementById('stat-needed');
  nel.textContent = needed;
  if (math) {
    nel.className = 'prog-stat-num' + (needed > 80 ? ' alert' : needed > 40 ? ' warn' : ' ok');
  } else {
    nel.className = 'prog-stat-num';
  }

  document.getElementById('prog-pct').textContent  = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-sub-left').textContent =
    `${done.toLocaleString()} / ${(settings.total||TOTAL_DEFAULT).toLocaleString()} unique questions`;
  document.getElementById('prog-sub-right').textContent = settings.finishBy
    ? `Finish by ${new Date(settings.finishBy+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}`
    : '';
}

// ── Charts (Live from Volume Logs) ────────────────────
let activeCharts = {}, chartView = 'daily';

function buildLiveChartData() {
  const rows = entries.map(e => ({
    dt: new Date(e.date + 'T12:00:00'),
    qs: e.qs || 0,
    score: (e.score !== undefined && e.score !== null) ? Number(e.score) : null
  })).filter(r => !isNaN(r.dt.getTime()));
  if (!rows.length) return null;
  return aggregate(rows);
}

function aggregate(rows) {
  rows.sort((a,b) => a.dt - b.dt);
  const fmtKey = {
    daily:   d => d.toISOString().slice(0,10),
    weekly:  d => { const s=new Date(d); s.setDate(d.getDate()-d.getDay()); return s.toISOString().slice(0,10); },
    monthly: d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
  };
  const result = {};
  ['daily','weekly','monthly'].forEach(view => {
    const map = {};
    rows.forEach(r => {
      const key = fmtKey[view](r.dt);
      if (!map[key]) map[key] = { qs:0, scores:[] };
      map[key].qs += r.qs;
      if (r.score !== null) map[key].scores.push(r.score);
    });
    const keys = Object.keys(map).sort();
    keys.forEach(k => {
      const d = new Date(k+(view==='monthly'?'-01':'')+'T12:00:00');
      map[k].label = view==='daily'   ? d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
                   : view==='weekly'  ? 'Wk '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
                   :                    d.toLocaleDateString('en-US',{month:'short',year:'numeric'});
      map[k].avgScore = map[k].scores.length
        ? Math.round(map[k].scores.reduce((a,b)=>a+b,0)/map[k].scores.length) : null;
    });
    result[view] = { keys, map };
  });
  
  let cum = 0;
  result.cumul = { labels:[], values:[] };
  result.daily.keys.forEach(k => {
    cum += result.daily.map[k].qs;
    result.cumul.labels.push(result.daily.map[k].label);
    result.cumul.values.push(cum);
  });
  const allScores = rows.filter(r=>r.score!==null).map(r=>r.score);
  result.hasScore = allScores.length > 0;
  return result;
}

function renderCharts() {
  const data = buildLiveChartData();
  const body = document.getElementById('charts-body');
  if (!data) {
    body.innerHTML = '<div class="charts-empty">Log your first session to start tracking</div>';
    Object.keys(activeCharts).forEach(k => { activeCharts[k].destroy(); delete activeCharts[k]; });
    return;
  }
  if (!document.getElementById('chart-qs')) {
    body.innerHTML = `
      <div class="chart-label" id="qs-label">Questions Completed</div>
      <div class="chart-canvas-wrap"><canvas id="chart-qs"></canvas></div>
      <div id="score-chart-block" style="display:none;">
        <div class="chart-label" id="sc-label">Average % Correct</div>
        <div class="chart-canvas-wrap"><canvas id="chart-score"></canvas></div>
      </div>
      <div class="chart-label">Cumulative Total Volume (Including Incorrects)</div>
      <div class="chart-canvas-wrap"><canvas id="chart-cumul"></canvas></div>
    `;
  }
  setChartView(chartView, data);
}

function setChartView(view, data) {
  chartView = view;
  data = data || buildLiveChartData();
  if (!data) return;
  document.querySelectorAll('#chart-view-toggle .view-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));

  const d = data[view];
  const labels = d.keys.map(k => d.map[k].label);
  const qsVals = d.keys.map(k => d.map[k].qs);
  const scVals = d.keys.map(k => d.map[k].avgScore);
  const tagText = view==='daily' ? '(per day)' : view==='weekly' ? '(per week)' : '(per month)';

  const qlEl = document.getElementById('qs-label');
  if (qlEl) qlEl.textContent = 'Questions Completed ' + tagText;
  const slEl = document.getElementById('sc-label');
  if (slEl) slEl.textContent = 'Average % Correct ' + tagText;

  buildBarChart('chart-qs', labels, qsVals, 'Questions');
  buildCumulChart('chart-cumul', data.cumul.labels, data.cumul.values);
  const sb = document.getElementById('score-chart-block');
  if (sb) {
    if (data.hasScore && scVals.some(v => v !== null)) {
      sb.style.display = '';
      buildLineChart('chart-score', labels, scVals);
    } else { sb.style.display = 'none'; }
  }
}

function destroyChart(id) { if (activeCharts[id]) { activeCharts[id].destroy(); delete activeCharts[id]; } }

function chartDefaults() {
  return {
    responsive:true, maintainAspectRatio:false, animation:{duration:300},
    plugins: {
      legend:{display:false},
      tooltip:{
        backgroundColor:'rgba(26,20,40,.88)',
        titleFont:{family:"'DM Mono',monospace",size:9},
        bodyFont:{family:"'Jost',sans-serif",size:12},
        padding:10, cornerRadius:6
      }
    },
    scales:{
      x:{grid:{color:'rgba(236,216,222,.3)'},ticks:{font:{family:"'DM Mono',monospace",size:8},color:'#c0a8b4',maxRotation:45,autoSkip:true,maxTicksLimit:16}},
      y:{grid:{color:'rgba(236,216,222,.3)'},ticks:{font:{family:"'DM Mono',monospace",size:8},color:'#c0a8b4'},beginAtZero:true}
    }
  };
}

function buildBarChart(id, labels, data) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  activeCharts[id] = new Chart(ctx.getContext('2d'), {
    type:'bar', data:{labels, datasets:[{data, backgroundColor:'rgba(61,46,110,.7)', borderRadius:3, borderSkipped:false}]},
    options:chartDefaults()
  });
}

function buildLineChart(id, labels, data) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  const opts = chartDefaults();
  opts.scales.y.max=100; opts.scales.y.ticks.callback = v=>v+'%';
  opts.plugins.tooltip.callbacks = {label: c => c.parsed.y!==null ? c.parsed.y+'%':'N/A'};
  activeCharts[id] = new Chart(ctx.getContext('2d'), {
    type:'line', data:{labels, datasets:[{data, borderColor:'var(--sakura2)', backgroundColor:'rgba(212,96,122,.07)',
      pointBackgroundColor:'var(--sakura2)', pointRadius:labels.length>60?1:3,
      fill:true, tension:0.35, spanGaps:true}]},
    options:opts
  });
}

function buildCumulChart(id, labels, data) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  const opts = chartDefaults();
  
  const maxVal = Math.max(settings.total || TOTAL_DEFAULT, ...data);
  opts.scales.y.max = maxVal + 100;
  opts.scales.y.ticks.callback = v => v.toLocaleString();
  
  const gradient = ctx.getContext('2d').createLinearGradient(0,0,0,180);
  gradient.addColorStop(0,'rgba(61,46,110,.2)'); gradient.addColorStop(1,'rgba(61,46,110,.01)');
  activeCharts[id] = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{labels, datasets:[
      {label:'Total Volume Done', data, borderColor:'var(--fuji)', backgroundColor:gradient,
       pointRadius:labels.length>60?0:2, fill:true, tension:0.2},
      {label:'Total QBank Size', data:labels.map(()=>settings.total || TOTAL_DEFAULT), borderColor:'rgba(212,96,122,.3)',
       borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false}
    ]},
    options:{...opts, plugins:{...opts.plugins, legend:{display:true,
      labels:{font:{family:"'DM Mono',monospace",size:8},color:'#c0a8b4',boxWidth:10}}}}
  });
}

// ── Log and Edit Entries ──────────────────────────────
function setMode(mode) {
  document.getElementById('log-questions-panel').style.display = mode==='questions'?'':'none';
  document.getElementById('log-exam-panel').style.display      = mode==='exam'?'':'none';
  document.getElementById('mode-qs').classList.toggle('active',   mode==='questions');
  document.getElementById('mode-exam').classList.toggle('active', mode==='exam');
}

function logEntry() {
  const date  = document.getElementById('log-date').value  || todayStr();
  const qs    = parseInt(document.getElementById('log-qs').value);
  const score = document.getElementById('log-score').value;
  if (!qs || qs<1) { showToast('Enter number of questions ✦'); return; }

  const entryData = {
    _id: editingEntryId || Date.now().toString(),
    date, 
    qs, 
    score: score !== '' ? Number(score) : undefined
  };

  if (editingEntryId) {
    entries = entries.map(e => e._id === editingEntryId ? entryData : e);
    showToast('Entry updated ✦');
  } else {
    entries.push(entryData);
    showToast(`${qs} questions logged ✦`);
  }

  saveLocal(); syncToFirebase(); renderAll();
  cancelEditEntry();
}

function editEntry(id) {
  const e = entries.find(x => x._id === id);
  if (!e) return;
  document.getElementById('log-date').value = e.date;
  document.getElementById('log-qs').value = e.qs;
  document.getElementById('log-score').value = e.score !== undefined ? e.score : '';
  editingEntryId = id;
  const btn = document.getElementById('btn-log-qs');
  btn.textContent = 'Update ✦';
  btn.classList.add('editing');
  document.getElementById('cancel-edit-qs').style.display = 'inline-block';
  setMode('questions');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEditEntry() {
  editingEntryId = null;
  document.getElementById('log-qs').value = '';
  document.getElementById('log-score').value = '';
  document.getElementById('log-date').value = todayStr();
  const btn = document.getElementById('btn-log-qs');
  btn.textContent = 'Log ✦';
  btn.classList.remove('editing');
  document.getElementById('cancel-edit-qs').style.display = 'none';
}

function logExam() {
  const date = document.getElementById('exam-date').value || todayStr();
  const name = document.getElementById('exam-name').value;
  const epc = document.getElementById('exam-epc').value;
  const epp = document.getElementById('exam-epp').value;
  
  if (!name) { showToast('Select an exam name ✦'); return; }

  const examData = {
    _id: editingExamId || Date.now().toString(),
    date,
    name,
    epc: epc !== '' ? Number(epc) : undefined, 
    epp: epp !== '' ? Number(epp) : undefined
  };

  if (editingExamId) {
    exams = exams.map(e => e._id === editingExamId ? examData : e);
    showToast('Exam updated ✦');
  } else {
    exams.push(examData);
    showToast(`${name} logged ✦`);
  }

  saveLocal(); syncToFirebase(); renderExams();
  cancelEditExam();
}

function editExam(id) {
  const e = exams.find(x => x._id === id);
  if (!e) return;
  document.getElementById('exam-date').value = e.date;
  document.getElementById('exam-name').value = e.name;
  document.getElementById('exam-epc').value = e.epc !== undefined ? e.epc : '';
  document.getElementById('exam-epp').value = e.epp !== undefined ? e.epp : '';
  editingExamId = id;
  const btn = document.getElementById('btn-log-exam');
  btn.textContent = 'Update ✦';
  btn.classList.add('editing');
  document.getElementById('cancel-edit-exam').style.display = 'inline-block';
  setMode('exam');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEditExam() {
  editingExamId = null;
  document.getElementById('exam-name').value = '';
  document.getElementById('exam-epc').value = '';
  document.getElementById('exam-epp').value = '';
  document.getElementById('exam-date').value = todayStr();
  const btn = document.getElementById('btn-log-exam');
  btn.textContent = 'Log ✦';
  btn.classList.remove('editing');
  document.getElementById('cancel-edit-exam').style.display = 'none';
}

function deleteEntry(id) {
  entries = entries.filter(e => e._id !== id);
  saveLocal(); syncToFirebase(); renderAll();
  showToast('Entry removed');
}

function deleteExam(id) {
  exams = exams.filter(e => e._id !== id);
  saveLocal(); syncToFirebase(); renderExams();
  showToast('Exam removed');
}

// ── Render Views ──────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-container');
  if (!entries.length) { el.innerHTML='<div class="uw-empty">No entries yet</div>'; return; }
  const asc=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const totalsMap={};
  let cum = 0;
  asc.forEach(e => { cum += (e.qs||0); totalsMap[e._id] = cum; });
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  let html=`<table class="uw-table"><thead><tr>
    <th>Date</th><th>Questions</th><th>% Correct</th><th>Running Total</th><th>Actions</th>
  </tr></thead><tbody>`;
  sorted.forEach(e=>{
    const ds=new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    let sc='—';
    if (e.score!==undefined&&e.score!==null&&e.score!=='') {
      const s=Number(e.score);
      sc=`<span class="uw-badge ${s>=70?'good':s>=55?'warn':'bad'}">${s}%</span>`;
    }
    const actions = e.fromCSV
      ? `<span class="uw-badge csv">csv</span>`
      : `<button class="action-btn" onclick="editEntry('${e._id}')">✎ Edit</button>
         <button class="action-btn del" onclick="deleteEntry('${e._id}')">✕</button>`;
    html+=`<tr>
      <td>${ds}</td>
      <td><span class="uw-badge qs">+${e.qs}</span></td>
      <td>${sc}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">${(totalsMap[e._id]||0).toLocaleString()}</td>
      <td>${actions}</td>
    </tr>`;
  });
  el.innerHTML=html+'</tbody></table>';
}

function renderExams() {
  const el=document.getElementById('exam-container');
  if (!exams.length){el.innerHTML='<div class="uw-empty">No practice exams logged yet</div>';return;}
  const sorted=[...exams].sort((a,b)=>b.date.localeCompare(a.date));
  let html=`<table class="uw-table"><thead><tr>
    <th>Date</th><th>Exam</th><th>EPC (%)</th><th>Prob. Pass (%)</th><th>Actions</th>
  </tr></thead><tbody>`;
  sorted.forEach(e=>{
    const ds=new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    let epc='—', epp='—';
    if(e.epc!==undefined&&e.epc!==''){const p=Number(e.epc);epc=`<span class="uw-badge ${p>=70?'good':p>=55?'warn':'bad'}">${p}%</span>`;}
    if(e.epp!==undefined&&e.epp!==''){const p=Number(e.epp);epp=`<span class="uw-badge pred">${p}%</span>`;}
    
    const actions=`
      <button class="action-btn" onclick="editExam('${e._id}')">✎ Edit</button>
      <button class="action-btn del" onclick="deleteExam('${e._id}')">✕</button>`;

    html+=`<tr>
      <td>${ds}</td><td style="font-weight:500;">${e.name||'—'}</td><td>${epc}</td>
      <td>${epp}</td>
      <td>${actions}</td>
    </tr>`;
  });
  el.innerHTML=html+'</tbody></table>';
}

function renderAll() {
  initSetupUI(); renderStats(); renderHistory(); renderExams(); renderCharts();
}

// ── Import modal ──────────────────────────────────────
let csvRawRows=[], csvHeaders=[], colMap={date:'',questions:'',score:''};

function openImportModal()  { document.getElementById('import-modal').classList.add('open'); }
function closeImportModal() { document.getElementById('import-modal').classList.remove('open'); }
function handleModalClick(e) { if(e.target===document.getElementById('import-modal')) closeImportModal(); }

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)handleFile(f);});
document.getElementById('csv-file-input').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

function handleFile(file) {
  const r=new FileReader();
  r.onload=e=>{try{parseCSV(e.target.result,file.name);}catch(err){showToast('Could not read file');}};
  r.readAsText(file);
}

function parseCSV(text,filename) {
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){showToast('File appears empty');return;}
  csvHeaders=splitCSVLine(lines[0]);
  csvRawRows=[];
  for(let i=1;i<lines.length;i++){
    const vals=splitCSVLine(lines[i]);
    if(vals.every(v=>v.trim()===''))continue;
    const row={};
    csvHeaders.forEach((h,idx)=>{row[h]=(vals[idx]||'').trim().replace(/^["']|["']$/g,'');});
    csvRawRows.push(row);
  }
  document.getElementById('csv-file-info').textContent=`${filename} · ${csvRawRows.length} rows`;
  autoDetectCols(); renderColMapper();
  document.getElementById('col-mapper').style.display='';
  document.getElementById('drop-zone').style.display='none';
}

function splitCSVLine(line) {
  const result=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&(i===0||line[i-1]===',')){inQ=true;continue;}
    if(ch==='"'&&inQ){inQ=false;continue;}
    if(ch===','&&!inQ){result.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  result.push(cur.trim()); return result;
}

function autoDetectCols() {
  const lower=csvHeaders.map(h=>h.toLowerCase());
  const find=kws=>{for(const kw of kws){const i=lower.findIndex(h=>h.includes(kw));if(i>=0)return csvHeaders[i];}return '';};
  colMap.date=find(['date','day','time','when']);
  colMap.questions=find(['question','qs','count','num','total','completed','done']);
  colMap.score=find(['score','correct','pct','percent','accuracy','grade','result']);
}

function renderColMapper() {
  const fields=[
    {key:'date',label:'Date *'},
    {key:'questions',label:'Questions *'},
    {key:'score',label:'Score % (optional)'},
  ];
  document.getElementById('col-mapper-grid').innerHTML=fields.map(f=>`
    <div class="map-row">
      <div class="map-label">${f.label}</div>
      <select class="map-select" id="map-${f.key}" onchange="colMap['${f.key}']=this.value">
        <option value="">— skip —</option>
        ${csvHeaders.map(h=>`<option value="${h}"${colMap[f.key]===h?' selected':''}>${h}</option>`).join('')}
      </select>
    </div>`).join('');
}

function importCSV() {
  if(!colMap.date||!colMap.questions){showToast('Map Date and Questions columns');return;}
  const parsed=[]; let fails=0;
  csvRawRows.forEach(row=>{
    const dt=parseFlexDate(row[colMap.date]);
    const qs=parseFloat(row[colMap.questions]);
    if(!dt||isNaN(qs)){fails++;return;}
    const rawSc=colMap.score?row[colMap.score]:null;
    const score=rawSc!==null&&rawSc!==''?parseFloat(rawSc):null;
    parsed.push({dt,qs,score:isNaN(score)?null:score});
  });
  if(!parsed.length){showToast('No valid rows — check mapping');return;}
  const imported=parsed.map((r,i)=>({
    _id:'csv_'+r.dt.toISOString().slice(0,10).replace(/-/g,'')+'_'+i,
    date:r.dt.toISOString().slice(0,10),
    qs:r.qs, score:r.score!==null?r.score:undefined, fromCSV:true
  }));
  entries=[...imported, ...entries.filter(e=>!e.fromCSV)];
  
  saveLocal(); syncToFirebase(); renderAll();
  
  document.getElementById('col-mapper').style.display='none';
  document.getElementById('import-success').style.display='';
  const totalQs=parsed.reduce((s,r)=>s+r.qs,0);
  document.getElementById('import-success-msg').textContent=
    `${parsed.length} sessions · ${totalQs.toLocaleString()} questions imported`;
}

function resetImport() {
  csvRawRows=[]; csvHeaders=[]; colMap={date:'',questions:'',score:''};
  document.getElementById('csv-file-input').value='';
  document.getElementById('col-mapper').style.display='none';
  document.getElementById('import-success').style.display='none';
  document.getElementById('drop-zone').style.display='';
}

function parseFlexDate(str) {
  if(!str)return null;
  str=str.trim().replace(/^["']|["']$/g,'');
  let d=new Date(str);
  if(!isNaN(d.getTime()))return d;
  const mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const m1=str.match(/^([A-Za-z]{3})\.?\s+(\d{1,2}),?\s+(\d{4})/);
  if(m1)return new Date(+m1[3],mo[m1[1].toLowerCase()],+m1[2]);
  const m2=str.match(/^(\d{1,2})\s+([A-Za-z]{3})\.?\s+(\d{4})/);
  if(m2)return new Date(+m2[3],mo[m2[2].toLowerCase()],+m2[1]);
  const p=str.split(/[\/\-\.]/);
  if(p.length===3){const[a,b,c]=p.map(Number);if(c>31)return new Date(c,a-1,b);if(a>12)return new Date(c,b-1,a);return new Date(c,a-1,b);}
  return null;
}

(function restoreCsvEntries() {
  try {
    const saved = localStorage.getItem('uw-entries');
    if (!saved) return;
    entries = entries.map(e => {
      if (e._id && e._id.startsWith('csv_')) return {...e, fromCSV:true};
      return e;
    });
  } catch(e) {}
})();

document.getElementById('log-date').value  = todayStr();
document.getElementById('exam-date').value = todayStr();
loadLocal();
runMigration();
renderAll();
</script>
