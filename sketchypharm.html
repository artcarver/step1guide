// ── Global State & Auth Listener ───────────────────────────
let watchedState = {};
let reviewedState = {};
const allVideos = categories.flatMap(c => c.videos);

window.addEventListener('appAuthStateChanged', async (e) => {
  const user = e.detail.user;
  const banner = document.getElementById('auth-banner');
  if (banner) banner.classList.toggle('hidden', !!user);
  
  if (user) {
    await fetchStateFromFirebase(user.uid);
  } else {
    watchedState = {};
    reviewedState = {};
  }
  renderAll();
});

// ── Database Operations ────────────────────────────────────
async function fetchStateFromFirebase(uid) {
  if (!db) return;
  try {
    const doc = await db.collection('users').doc(uid).collection('trackers').doc('sketchypharm').get();
    if (doc.exists) {
      const data = doc.data();
      watchedState = data.watched || {};
      reviewedState = data.reviewed || {};
    } else {
      watchedState = {};
      reviewedState = {};
    }
  } catch (err) {
    console.error("Error fetching state:", err);
  }
}

async function saveState() {
  if (!currentUser || !db) return;
  try {
    await db.collection('users').doc(currentUser.uid).collection('trackers').doc('sketchypharm').set({
      watched: watchedState,
      reviewed: reviewedState
    }, { merge: true });
  } catch (err) {
    console.error("Error saving state:", err);
  }
}

// ── Action Handlers ────────────────────────────────────────
function toggleWatch(id) {
  if (!currentUser) return alert("Please log in to track your progress.");
  watchedState[id] = !watchedState[id];
  saveState();
  renderAll();
}

function toggleReview(id) {
  if (!currentUser) return alert("Please log in to track your progress.");
  reviewedState[id] = !reviewedState[id];
  saveState();
  renderAll();
}

function toggleCategory(catId) {
  const body = document.getElementById(`cat-body-${catId}`);
  if (body) {
    const isHidden = body.style.display === 'none';
    body.style.display = isHidden ? 'block' : 'none';
  }
}

// ── Rendering Logic ────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderCategories();
}

function renderSummary() {
  const total = allVideos.length;
  const done = allVideos.filter(v => watchedState[v.id] && reviewedState[v.id]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  
  const pctEl = document.getElementById("tracker-pct");
  const barEl = document.getElementById("tracker-bar");
  const noteEl = document.getElementById("tracker-note");
  const statEl = document.getElementById("header-stats");

  if (pctEl) pctEl.textContent = pct + "%";
  if (barEl) barEl.style.width = pct + "%";
  if (noteEl) noteEl.textContent = `${done} / ${total} videos fully completed`;
  if (statEl) statEl.textContent = `${total - done} videos remaining`;
}

function renderCategories() {
  const container = document.getElementById("tracker-container");
  if (!container) return;

  let html = "";
  categories.forEach(cat => {
    const total = cat.videos.length;
    const done = cat.videos.filter(v => watchedState[v.id] && reviewedState[v.id]).length;
    
    html += `
    <div class="cat-section">
      <div class="cat-header" onclick="toggleCategory('${cat.id}')">
        <div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-why">${cat.why}</div>
        </div>
        <div class="cat-meta">
          <div>${done} / ${total} Complete</div>
          <div style="font-size:12px;color:var(--dim);margin-top:2px;font-style:normal;">${cat.totalTime}</div>
        </div>
      </div>
      <div class="cat-body" id="cat-body-${cat.id}">
        ${cat.videos.map(v => {
          const w = watchedState[v.id];
          const r = reviewedState[v.id];
          return `
          <div class="video-row">
            <div class="video-num">${v.num}</div>
            <div class="video-name">${v.name}</div>
            <div class="video-time">${v.time}</div>
            <div class="check-pair">
              <button class="check-btn ${w ? 'watched' : ''}" onclick="toggleWatch('${v.id}')">
                ${w ? '✓ Watched' : 'Watch'}
              </button>
              <button class="check-btn ${r ? 'reviewed' : ''}" onclick="toggleReview('${v.id}')">
                ${r ? '✓ Reviewed' : 'Review'}
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}
